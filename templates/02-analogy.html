<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>02 · 비유</title>
<link rel="stylesheet" href="../shared/styles.css">
<style>
  .analogy .main { justify-content: center; gap: var(--space-6); }
  .analogy .lead {
    font-size: var(--fs-h2);
    font-weight: 700;
    line-height: 1.3;
    letter-spacing: -0.01em;
    margin-bottom: var(--space-4);
  }
  .analogy .lead .em { color: var(--accent); }
  .analogy .pair {
    display: grid;
    grid-template-columns: 1fr 80px 1fr;
    align-items: stretch;
    gap: var(--space-3);
  }
  .analogy .cell {
    padding: var(--space-6);
    border-radius: var(--radius-md);
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
  }
  .analogy .cell.a { background: var(--surface); }
  .analogy .cell.b { background: var(--accent-soft); }
  .analogy .cell .role {
    font-size: var(--fs-label);
    font-weight: 600;
    color: var(--ink-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .analogy .cell.b .role { color: var(--accent); }
  .analogy .cell .text {
    font-size: 32px;
    font-weight: 600;
    line-height: 1.35;
    color: var(--ink);
  }
  .analogy .connector {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    font-weight: 300;
    color: var(--ink-muted);
  }
  .analogy .caption-note {
    margin-top: var(--space-6);
    font-size: var(--fs-caption);
    color: var(--ink-muted);
    text-align: center;
  }
</style>
</head>
<body data-page="02" data-total="06">
  <div class="card analogy">
    <div class="meta-top">
      <span class="label">비유</span>
      <span class="num page-display"></span>
    </div>
    <div class="main">
      <p class="lead">더닝–크루거 효과는<br>마치 <span class="em">자전거 내리막</span>에서 외치는<br>"나 잘 타네!" 같은 것.</p>
      <div class="pair">
        <div class="cell a">
          <span class="role">개념</span>
          <span class="text">모를수록 스스로를 더 잘한다고 착각하는 상태</span>
        </div>
        <div class="connector">≈</div>
        <div class="cell b">
          <span class="role">비유</span>
          <span class="text">자전거 3번 타본 후, 언덕 내리막에서 "프로네!" 외치는 순간</span>
        </div>
      </div>
      <p class="caption-note">실제 실력이 아니라, <b>경험의 부족이 자신감을 만든다.</b></p>
    </div>
    <div class="meta-bottom">
      <span class="brand">@what_is_this.zip</span>
      <span>#심리학</span>
    </div>
  </div>
  <script src="../shared/page-number.js"></script>
</body>
</html>

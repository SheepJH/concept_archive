<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>16 · 공식·정의</title>
<link rel="stylesheet" href="../shared/styles.css">
<style>
  .formula .main { justify-content: center; gap: var(--space-6); }
  .formula .heading {
    font-size: var(--fs-h2);
    font-weight: 700;
    line-height: 1.25;
    letter-spacing: -0.01em;
  }
  .formula .heading .accent { color: var(--accent); }
  .formula .equation {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-4);
    padding: var(--space-6) var(--space-4);
    background: var(--surface);
    border-radius: var(--radius-md);
    font-family: var(--font-num);
    font-weight: 800;
    color: var(--ink);
    line-height: 1;
  }
  .formula .equation .lhs,
  .formula .equation .rhs {
    font-size: 72px;
    letter-spacing: -0.02em;
  }
  .formula .equation .lhs { color: var(--accent); }
  .formula .equation .op {
    font-size: 72px;
    font-weight: 400;
    color: var(--ink-muted);
  }
  .formula .equation .frac {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .formula .equation .frac .top,
  .formula .equation .frac .bot {
    font-size: 48px;
    line-height: 1;
    letter-spacing: -0.01em;
  }
  .formula .equation .frac .bar {
    width: 100%;
    min-width: 160px;
    height: 4px;
    background: var(--ink);
    border-radius: 2px;
  }
  .formula .explain {
    font-size: 30px;
    font-weight: 500;
    line-height: 1.45;
    color: var(--ink-soft);
    text-align: center;
    max-width: 820px;
    margin: 0 auto;
  }
  .formula .explain b { color: var(--ink); }
  .formula .legend {
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    margin-top: var(--space-2);
  }
  .formula .legend .row {
    display: grid;
    grid-template-columns: auto 1fr;
    align-items: baseline;
    gap: var(--space-3);
    padding: var(--space-2) 0;
    border-bottom: 1px solid var(--line);
  }
  .formula .legend .row:last-child { border-bottom: none; }
  .formula .legend .sym {
    font-family: var(--font-num);
    font-weight: 800;
    font-size: 32px;
    color: var(--accent);
    letter-spacing: -0.01em;
    white-space: nowrap;
  }
  .formula .legend .desc {
    font-size: 24px;
    line-height: 1.4;
    color: var(--ink);
  }
</style>
</head>
<body data-page="03" data-total="08">
  <div class="card formula">
    <div class="meta-top">
      <span class="label">공식</span>
      <span class="num page-display"></span>
    </div>
    <div class="main">
      <h2 class="heading">이 개념을<br><span class="accent">한 줄로</span></h2>
      <div class="equation">
        <span class="lhs">자신감</span>
        <span class="op">=</span>
        <span class="frac">
          <span class="top">배운 것</span>
          <span class="bar"></span>
          <span class="bot">모르는 것</span>
        </span>
      </div>
      <p class="explain">
        자신감은 절대적 실력이 아니라, <b>인지한 범위의 비율</b>이다.
        분모가 드러날수록 값은 작아진다.
      </p>
      <div class="legend">
        <div class="row">
          <span class="sym">배운 것</span>
          <span class="desc">이미 내가 알고 있다고 여기는 영역</span>
        </div>
        <div class="row">
          <span class="sym">모르는 것</span>
          <span class="desc">실제로 이 분야에 존재하는 미지의 영역</span>
        </div>
      </div>
    </div>
    <div class="meta-bottom">
      <span class="brand">@what_is_this.zip</span>
      <span>#심리학</span>
    </div>
  </div>
  <script src="../shared/page-number.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>03 · 오해와 진실</title>
<link rel="stylesheet" href="../shared/styles.css">
<style>
  .misc .main { justify-content: center; gap: var(--space-4); }
  .misc .row {
    display: grid;
    grid-template-columns: 100px 1fr;
    gap: var(--space-6);
    padding: var(--space-6);
    border-radius: var(--radius-md);
    align-items: start;
  }
  .misc .row.x { background: #FAFAFA; border: 1px solid var(--line); }
  .misc .row.o { background: var(--accent-soft); }
  .misc .badge {
    width: 80px; height: 80px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 56px;
    font-weight: 800;
    font-family: var(--font-num);
  }
  .misc .row.x .badge { background: #fff; color: #B00020; border: 2px solid #B00020; }
  .misc .row.o .badge { background: var(--accent); color: #fff; }
  .misc .content .role {
    font-size: var(--fs-label);
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: var(--space-2);
  }
  .misc .row.x .role { color: #B00020; }
  .misc .row.o .role { color: var(--accent); }
  .misc .content .text {
    font-size: 34px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--ink);
  }
  .misc .content .sub {
    margin-top: var(--space-2);
    font-size: var(--fs-caption);
    color: var(--ink-soft);
    line-height: 1.45;
    font-weight: 400;
  }
  .misc .vs {
    text-align: center;
    font-size: var(--fs-caption);
    color: var(--ink-muted);
    letter-spacing: 0.3em;
    font-weight: 700;
    margin: 4px 0;
  }
</style>
</head>
<body data-page="02" data-total="06">
  <div class="card misc">
    <div class="meta-top">
      <span class="label">오해와 진실</span>
      <span class="num page-display"></span>
    </div>
    <div class="main">
      <div class="row x">
        <div class="badge">✕</div>
        <div class="content">
          <div class="role">흔한 오해</div>
          <div class="text">"자신감 넘치는 사람이 진짜 실력자다."</div>
          <div class="sub">SNS·미디어에서 자주 퍼지는 인식. 자신감 = 역량이라는 착각.</div>
        </div>
      </div>
      <div class="vs">REALITY</div>
      <div class="row o">
        <div class="badge">✓</div>
        <div class="content">
          <div class="role">진실</div>
          <div class="text">실력자일수록 "내가 모르는 게 많다"고 느낀다.</div>
          <div class="sub">알수록 지식의 경계가 넓어져, 오히려 겸손해진다. 이를 '무지의 지평선'이라 부른다.</div>
        </div>
      </div>
    </div>
    <div class="meta-bottom">
      <span class="brand">@what_is_this.zip</span>
      <span>#심리학</span>
    </div>
  </div>
  <script src="../shared/page-number.js"></script>
</body>
</html>

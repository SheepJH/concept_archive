<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>07 · 빛과 그림자</title>
<link rel="stylesheet" href="../shared/styles.css">
<style>
  .pc .main { justify-content: center; gap: var(--space-4); }
  .pc .heading {
    font-size: var(--fs-h2);
    font-weight: 700;
    line-height: 1.25;
    letter-spacing: -0.01em;
    margin-bottom: var(--space-2);
  }
  .pc .grid {
    display: grid;
    grid-template-rows: 1fr 1fr;
    gap: var(--space-4);
  }
  .pc .panel {
    padding: var(--space-6);
    border-radius: var(--radius-md);
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
  }
  .pc .panel.pros { background: var(--accent-soft); }
  .pc .panel.cons { background: #FAFAFA; border: 1px solid var(--line); }
  .pc .panel-title {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    font-size: 32px;
    font-weight: 800;
  }
  .pc .panel-title .ico {
    width: 48px; height: 48px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 800;
  }
  .pc .pros .panel-title { color: var(--accent); }
  .pc .pros .panel-title .ico { background: var(--accent); color: #fff; }
  .pc .cons .panel-title { color: var(--ink); }
  .pc .cons .panel-title .ico { background: var(--ink); color: #fff; }
  .pc .list {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .pc .list .item {
    display: grid;
    grid-template-columns: 28px 1fr;
    gap: 14px;
    font-size: 26px;
    line-height: 1.4;
    color: var(--ink);
  }
  .pc .list .item::before {
    content: "·";
    font-size: 40px;
    line-height: 0.7;
    color: var(--ink-muted);
  }
  .pc .pros .item::before { color: var(--accent); }
</style>
</head>
<body data-page="02" data-total="06">
  <div class="card pc">
    <div class="meta-top">
      <span class="label">빛과 그림자</span>
      <span class="num page-display"></span>
    </div>
    <div class="main">
      <h2 class="heading">이 개념을 안다는 것의<br><span class="accent">양날</span></h2>
      <div class="grid">
        <div class="panel pros">
          <div class="panel-title"><span class="ico">+</span> 밝은 면</div>
          <div class="list">
            <div class="item">자기 판단에 의심할 여지를 만들어준다</div>
            <div class="item">모르는 영역을 인정하면 학습이 빨라진다</div>
            <div class="item">피드백을 방어 대신 자료로 받아들인다</div>
          </div>
        </div>
        <div class="panel cons">
          <div class="panel-title"><span class="ico">−</span> 어두운 면</div>
          <div class="list">
            <div class="item">과도한 자기 의심으로 결정 마비가 올 수 있다</div>
            <div class="item">"나는 아직 부족해" 핑계로 실행을 미룬다</div>
            <div class="item">남을 '무식한 사람' 프레임으로 재단하기 쉽다</div>
          </div>
        </div>
      </div>
    </div>
    <div class="meta-bottom">
      <span class="brand">@what_is_this.zip</span>
      <span>#심리학</span>
    </div>
  </div>
  <script src="../shared/page-number.js"></script>
</body>
</html>
